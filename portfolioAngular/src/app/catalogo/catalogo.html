@if (carregando) {
    <p>Carregando catálogo...</p>
}

@if (erro) {
    <p>{{ erro }}</p>
}

@if (!carregando && tecnologias.length === 0) {
    <p>Nenhuma tecnologia cadastrada ainda.</p>
}

@for (t of tecnologias; track t.id) {
    <mat-card style="margin-bottom: 12px;">
        <mat-card-header>
            <mat-card-title>{{ t.nome }}</mat-card-title>
            <mat-card-subtitle>
                {{ t.categoria }}
            </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            {{ t.descricao }}
        </mat-card-content>
    </mat-card>
}
